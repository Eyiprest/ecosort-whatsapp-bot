services:
  - type: web
    name: ecosort-whatsapp-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_NAME
        value: ecosort-session
      - key: AUTH_DIR
        value: /tmp/auth
      - key: DATA_DIR
        value: /tmp/storage
