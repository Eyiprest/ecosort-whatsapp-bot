services:
  - type: web
    name: ecosort-whatsapp-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_NAME
        value: ecosort-session
    disks:
      - name: ecosort-auth
        mountPath: /data/auth
        sizeGB: 1
      - name: ecosort-storage
        mountPath: /data/storage
        sizeGB: 1
