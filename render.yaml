services:
  - type: web
    name: ecosort-whatsapp-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_NAME
        value: ecosort-session
      - key: AUTH_DIR
        value: ./auth/baileys
      - key: DATA_DIR
        value: ./data
      - key: BOT_NAME
        value: EcoSort
      - key: ADMIN_NUMBER
        sync: false
      - key: BAILEYS_AUTH
        sync: false
      - key: ADMIN_TOKEN
        sync: false
